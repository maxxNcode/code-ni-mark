<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE ni MARK</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Highlight.js -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    },
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#0b0f19',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0b0f19;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.04), transparent 25%);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.8);
        }

        /* Editor base styles */
        #code-editor {
            tab-size: 4;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .glass-header {
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Smooth interactivity */
        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-hover:hover {
            transform: translateY(-1px);
        }

        .btn-hover:active {
            transform: translateY(1px);
        }

        .list-item-enter {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>

<body
    class="text-slate-200 h-screen flex flex-col font-sans overflow-hidden antialiased selection:bg-emerald-500/30 selection:text-emerald-200">

    <!-- Header -->
    <header
        class="glass-header border-b border-slate-800/60 p-4 flex justify-between items-center z-20 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
        <div class="flex items-center gap-4">
            <div
                class="bg-gradient-to-br from-emerald-400 to-teal-500 text-slate-950 font-black px-3 py-1.5 rounded-lg text-lg shadow-[0_0_15px_rgba(16,185,129,0.4)] flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-white flex items-baseline gap-1.5">
                CODE <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">ni</span> <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">MARK</span>
            </h1>
        </div>
        <div class="flex items-center gap-5 text-sm">
            <span class="text-slate-400 hidden sm:inline-block font-medium">Personal Repository</span>
            <button id="btn-show-login"
                class="btn-hover px-4 py-1.5 bg-slate-800/80 hover:bg-slate-700 text-slate-200 rounded-md border border-slate-700/50 shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
                Admin
            </button>
            <button id="btn-logout"
                class="btn-hover px-4 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-md border border-red-500/20 hidden flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div
        class="flex flex-1 overflow-hidden relative z-10 w-full max-w-screen-2xl mx-auto border-x border-slate-800/30 line-height-tight">

        <!-- Mobile Overlay -->
        <div id="mobile-overlay"
            class="md:hidden fixed inset-0 bg-black/50 z-40 hidden transition-opacity duration-300 opacity-0"
            onclick="closeAllSidebars()"></div>

        <!-- Projects Column -->
        <div id="projects-column"
            class="absolute md:relative z-50 md:z-10 w-0 md:w-64 opacity-0 md:opacity-100 overflow-hidden shrink-0 glass-panel md:border-r border-slate-800/60 flex flex-col shadow-2xl md:shadow-xl transition-all duration-300 h-full bg-[#0a0a0f] md:bg-transparent">
            <div class="p-5 border-b border-slate-800/60 backdrop-blur-sm">
                <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-500/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    Projects
                </h2>
                <form id="form-new-project" class="flex flex-col hidden admin-only group">
                    <div class="flex gap-2">
                        <input type="text" id="input-project-name" placeholder="New Project..."
                            class="w-full bg-slate-900/50 text-sm px-3 py-2 rounded-md border border-slate-700/50 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 text-slate-200 placeholder-slate-600 transition-all font-medium"
                            required>
                        <button type="submit"
                            class="btn-hover bg-slate-800 hover:bg-emerald-500/20 hover:text-emerald-400 text-slate-400 aspect-square px-3 rounded-md text-sm border border-slate-700/50 hover:border-emerald-500/30 flex items-center justify-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                    </div>
                    <input type="password" id="input-project-passcode" placeholder="Set Deletion Passcode"
                        class="w-full bg-slate-900/50 text-xs px-3 py-1.5 rounded-md border border-slate-700/50 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 text-slate-400 placeholder-slate-600 transition-all mt-2"
                        required>
                </form>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="projects-list">
                <!-- Projects injected here via JS -->
            </div>
        </div>

        <!-- Files Column -->
        <div id="files-column"
            class="absolute md:relative z-40 md:z-10 w-0 opacity-0 overflow-hidden shrink-0 bg-slate-900/95 border-none md:border-r border-slate-800/60 flex flex-col shadow-2xl transition-all duration-300 h-full">
            <div class="p-5 border-b border-slate-800/60 flex justify-between items-center bg-slate-800/20">
                <h2 class="text-sm font-semibold text-slate-200 truncate flex items-center gap-2"
                    id="current-project-title">
                    <svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path>
                    </svg>
                    Files
                </h2>
                <button onclick="deleteCurrentProject()"
                    class="btn-hover text-slate-500 hover:text-red-400 hover:bg-red-400/10 p-1.5 rounded-md transition-colors hidden admin-only"
                    id="btn-delete-project" title="Delete Project">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-3 border-b border-slate-800/60 hidden admin-only bg-slate-800/10" id="container-new-file">
                <form id="form-new-file" class="flex gap-2">
                    <input type="text" id="input-file-name" placeholder="folder/filename.js"
                        class="w-full bg-slate-950/50 text-sm px-3 py-2 rounded-md border border-slate-700/50 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 text-slate-200 placeholder-slate-600 transition-all font-mono"
                        required>
                    <button type="submit"
                        class="btn-hover bg-slate-800 hover:bg-emerald-500/20 hover:text-emerald-400 text-slate-400 aspect-square px-3 rounded-md text-sm border border-slate-700/50 hover:border-emerald-500/30 flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                    </button>
                </form>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="files-list">
            </div>
        </div>

        <!-- Editor/Viewer Area -->
        <div class="flex-1 bg-[#1e1e24] flex flex-col hidden relative shadow-[-10px_0_30px_rgba(0,0,0,0.2)]"
            id="editor-area">

            <!-- Editor Toolbar -->
            <div class="h-14 bg-[#18181d] border-b border-slate-800/80 flex items-center justify-between px-2 md:px-5">
                <div class="flex items-center gap-2 md:gap-3">
                    <button id="btn-toggle-projects" onclick="toggleProjects()"
                        class="btn-hover text-slate-400 hover:text-emerald-400 p-1.5 rounded-md hover:bg-slate-800 transition-colors"
                        title="Toggle Projects">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h7"></path>
                        </svg>
                    </button>
                    <button id="btn-toggle-files" onclick="toggleFiles()"
                        class="btn-hover text-slate-400 hover:text-emerald-400 p-1.5 rounded-md hover:bg-slate-800 transition-colors hidden"
                        title="Toggle Files">
                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                        </svg>
                    </button>
                    <div class="hidden md:flex gap-1.5 opacity-50 mx-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                    </div>
                    <svg class="w-4 h-4 text-emerald-400/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    <span id="current-file-name" class="font-mono text-sm text-slate-300"></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyCode()"
                        class="btn-hover px-3 py-1.5 text-xs font-semibold bg-slate-800 text-slate-300 hover:text-white rounded-md transition-colors flex items-center gap-1.5 border border-slate-700"
                        title="Copy to clipboard">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                            </path>
                        </svg>
                        Copy
                    </button>
                    <button onclick="deleteCurrentFile()"
                        class="btn-hover p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-md transition-colors hidden admin-only"
                        id="btn-delete-file" title="Delete File">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                    </button>
                    <div class="w-px h-4 bg-slate-700 mx-1 hidden admin-only self-center"></div>
                    <button id="btn-edit-toggle" onclick="toggleEditMode()"
                        class="btn-hover px-4 py-1.5 text-xs font-semibold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-500/20 rounded-md transition-all hidden admin-only flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        Edit
                    </button>
                    <button id="btn-save" onclick="saveFile()"
                        class="btn-hover px-4 py-1.5 text-xs font-semibold bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white rounded-md transition-all hidden shadow-[0_0_15px_rgba(16,185,129,0.3)] admin-only flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                            </path>
                        </svg>
                        Save
                    </button>
                </div>
            </div>

            <!-- Viewing Area -->
            <div id="view-mode" class="flex-1 overflow-auto relative bg-[#1e1e24]">
                <pre
                    class="m-0 h-full"><code id="code-viewer" class="h-full block p-6 text-[13px] leading-relaxed font-mono selection:bg-emerald-500/30"></code></pre>
            </div>

            <!-- Editing Area -->
            <div id="edit-mode" class="flex-1 relative hidden">
                <textarea id="code-editor"
                    class="w-full h-full bg-[#1e1e24] text-[#abb2bf] p-6 text-[13px] leading-relaxed font-mono focus:outline-none resize-none selection:bg-emerald-500/30"
                    spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state"
            class="flex-1 flex items-center justify-center flex-col text-slate-500 relative overflow-hidden">
            <!-- Decorative background elements -->
            <div
                class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LCAyNTUsIDI1NSwgMC4wNCkiLz48L3N2Zz4=')] opacity-50">
            </div>
            <div
                class="absolute top-1/2 left-1/2 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2">
            </div>

            <div class="relative z-10 flex flex-col items-center animate-slide-up text-center px-8">
                <div
                    class="w-20 h-20 mb-6 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700/50 shadow-2xl flex items-center justify-center text-emerald-500/50">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-3 text-slate-200 tracking-tight">Welcome to CODE ni MARK</h2>
                <p class="text-slate-400 max-w-md mx-auto leading-relaxed">Select a project from the sidebar to
                    start
                    browsing the code laboratory.</p>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Login Modal -->
    <div id="login-modal"
        class="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center hidden z-[100] transition-opacity">
        <div class="bg-slate-900 border border-slate-700/60 p-8 rounded-xl shadow-2xl w-full max-w-sm animate-slide-up">
            <div
                class="w-12 h-12 bg-emerald-500/10 rounded-full flex items-center justify-center text-emerald-500 mb-5 border border-emerald-500/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Admin Login</h2>
            <p class="text-sm text-slate-400 mb-6">Authenticate to create and edit projects.</p>

            <form id="form-login">
                <div class="mb-6">
                    <input type="password" id="input-password" placeholder="Enter admin password"
                        class="w-full bg-slate-950/50 text-slate-200 px-4 py-3 rounded-lg border border-slate-700 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder-slate-600 shadow-inner"
                        required>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="document.getElementById('login-modal').classList.add('hidden')"
                        class="btn-hover px-5 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">Cancel</button>
                    <button type="submit"
                        class="btn-hover px-6 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-medium rounded-lg shadow-[0_4px_15px_rgba(16,185,129,0.3)] transition-all">Authenticate</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // State
        let currentProjectId = null;
        let currentFileId = null;
        let isEditing = false;
        let isAdmin = localStorage.getItem('adminToken') !== null;
        let isSidebarVisible = true;
        let folderState = {}; // Tracks open/closed status by path: {'src': true, 'src/components': false}

        // Elements
        const elMobileOverlay = document.getElementById('mobile-overlay');
        const elProjectsColumn = document.getElementById('projects-column');
        const elBtnToggleProjects = document.getElementById('btn-toggle-projects');
        const elBtnToggleFiles = document.getElementById('btn-toggle-files');
        const elProjectsList = document.getElementById('projects-list');
        const elFilesList = document.getElementById('files-list');
        const elFilesColumn = document.getElementById('files-column');
        const elEditorArea = document.getElementById('editor-area');
        const elEmptyState = document.getElementById('empty-state');
        const elCurrentProjectTitle = document.getElementById('current-project-title');
        const elCurrentFileName = document.getElementById('current-file-name');
        const elCodeViewer = document.getElementById('code-viewer');
        const elCodeEditor = document.getElementById('code-editor');
        const elViewMode = document.getElementById('view-mode');
        const elEditMode = document.getElementById('edit-mode');
        const elBtnEditToggle = document.getElementById('btn-edit-toggle');
        const elBtnSave = document.getElementById('btn-save');
        const elLoginModal = document.getElementById('login-modal');
        const elBtnShowLogin = document.getElementById('btn-show-login');
        const elBtnLogout = document.getElementById('btn-logout');

        // File Icons Helper
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'js': case 'jsx': case 'ts': return '<svg class="w-4 h-4 text-yellow-400" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
                case 'html': return '<svg class="w-4 h-4 text-orange-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 3.8L18.4 19H5.6L12 5.8z"/></svg>';
                case 'css': return '<svg class="w-4 h-4 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M2.5 4h19l-1.6 15L12 21.5 4.1 19 2.5 4zm3.3 3.5l.5 6h7.7l-.3 3.2-2.7.7-2.7-.7-.2-2h-2.5l.4 4 4.8 1.5 5-1.5.8-8.7H5.8z"/></svg>';
                case 'json': return '<svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 7v10c0 2 1.5 3 3 3h10c2.5 0 3-1.5 3-3V7c0-2.5-.5-3-3-3H7c-1.5 0-3 1-3 3z"/></svg>';
                case 'md': return '<svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>';
                default: return '<svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>';
            }
        }

        // Initialize
        async function init() {
            updateAuthUI();
            await loadProjects();

            // Handle Tabs in textarea
            elCodeEditor.addEventListener('keydown', function (e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });
        }

        // --- Layout Logic ---
        let isProjectsVisible = window.innerWidth >= 768;
        let isFilesVisible = false;

        function updateMobileOverlay() {
            if (window.innerWidth < 768 && (isProjectsVisible || isFilesVisible)) {
                elMobileOverlay.classList.remove('hidden');
                setTimeout(() => elMobileOverlay.classList.remove('opacity-0'), 10);
            } else {
                elMobileOverlay.classList.add('opacity-0');
                setTimeout(() => elMobileOverlay.classList.add('hidden'), 300);
            }
        }

        function closeAllSidebars() {
            if (window.innerWidth < 768) {
                if (isProjectsVisible) toggleProjects();
                if (isFilesVisible) toggleFiles();
            }
        }

        function toggleProjects() {
            isProjectsVisible = !isProjectsVisible;
            if (isProjectsVisible) {
                elProjectsColumn.classList.remove('w-0', 'md:w-0', 'opacity-0');
                elProjectsColumn.classList.add('w-64', 'md:w-64', 'opacity-100');
                elBtnToggleProjects.classList.add('text-emerald-400', 'bg-slate-800');
            } else {
                elProjectsColumn.classList.add('w-0', 'md:w-0', 'opacity-0');
                elProjectsColumn.classList.remove('w-64', 'md:w-64', 'opacity-100');
                elBtnToggleProjects.classList.remove('text-emerald-400', 'bg-slate-800');
            }
            updateMobileOverlay();
        }

        function toggleFiles() {
            isFilesVisible = !isFilesVisible;
            if (isFilesVisible) {
                elFilesColumn.classList.remove('w-0', 'opacity-0');
                elFilesColumn.classList.add('w-64', 'opacity-100');
                elBtnToggleFiles.classList.add('text-emerald-400', 'bg-slate-800');
            } else {
                elFilesColumn.classList.add('w-0', 'opacity-0');
                elFilesColumn.classList.remove('w-64', 'opacity-100');
                elBtnToggleFiles.classList.remove('text-emerald-400', 'bg-slate-800');
            }
            updateMobileOverlay();
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768 && !isProjectsVisible) {
                toggleProjects();
            }
        });

        // --- Auth Logic ---
        function updateAuthUI() {
            const adminElements = document.querySelectorAll('.admin-only');
            if (isAdmin) {
                adminElements.forEach(el => el.classList.remove('hidden'));
                elBtnShowLogin.classList.add('hidden');
                elBtnLogout.classList.remove('hidden');
            } else {
                adminElements.forEach(el => el.classList.add('hidden'));

                // Hide specific flex forms safely
                document.getElementById('form-new-project').classList.add('hidden');
                document.getElementById('container-new-file').classList.add('hidden');

                elBtnShowLogin.classList.remove('hidden');
                elBtnLogout.classList.add('hidden');
                if (isEditing) toggleEditMode();
            }
        }

        elBtnShowLogin.addEventListener('click', () => {
            elLoginModal.classList.remove('hidden');
            setTimeout(() => document.getElementById('input-password').focus(), 100);
        });

        elBtnLogout.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            isAdmin = false;
            updateAuthUI();
            showToast("Logged out successfully");

            if (currentProjectId) selectProject(currentProjectId, elCurrentProjectTitle.innerText);
        });

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('input-password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (!res.ok) throw new Error("Invalid password");
                const data = await res.json();
                localStorage.setItem('adminToken', data.token);
                isAdmin = true;
                elLoginModal.classList.add('hidden');
                document.getElementById('input-password').value = '';
                updateAuthUI();
                showToast("Logged in as Admin", "success");

                if (currentProjectId) selectProject(currentProjectId, elCurrentProjectTitle.innerText);
                if (currentFileId) selectFile(currentFileId, elCurrentFileName.innerText);

            } catch (e) {
                showToast(e.message, "error");
            }
        });

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const isError = type === "error";
            const bgClass = isError ? "bg-red-50" : "bg-emerald-50";
            const borderClass = isError ? "border-red-500/30" : "border-emerald-500/30";
            const textClass = isError ? "text-red-600" : "text-emerald-700";
            const icon = isError
                ? `<svg class="w-5 h-5 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-5 h-5 text-emerald-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            toast.className = `flex items-center p-4 px-5 rounded-lg border shadow-xl ${bgClass} ${borderClass} font-medium animate-slide-up pointer-events-auto transition-all duration-300`;
            toast.innerHTML = `${icon} <span class="${textClass} text-sm">${message}</span>`;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px) scale(0.95)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function copyCode() {
            const textToCopy = elCodeViewer.textContent;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (!successful) throw new Error("Copy command failed");
                }
                showToast("Code copied to clipboard!");
            } catch (err) {
                showToast("Failed to copy code.", "error");
            }
        }

        // --- API Helpers ---
        async function api(endpoint, method = 'GET', data = null) {
            const options = { method, headers: {} };
            const token = localStorage.getItem('adminToken');
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            if (data) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
            const response = await fetch('/api' + endpoint, options);
            if (!response.ok) {
                const err = await response.json();
                if (response.status === 401 && isAdmin) {
                    localStorage.removeItem('adminToken');
                    isAdmin = false;
                    updateAuthUI();
                    showToast("Session expired. Please log in again.", "error");
                } else if (response.status !== 401) {
                    showToast('Error: ' + err.error, "error");
                }
                throw new Error(err.error);
            }
            return response.json();
        }

        // --- Project Logic ---
        async function loadProjects() {
            try {
                const projects = await api('/projects');
                elProjectsList.innerHTML = '';
                projects.forEach(p => {
                    const btn = document.createElement('button');
                    const isActive = currentProjectId === p.id;
                    btn.className = `w-full text-left px-3 py-2.5 rounded-lg text-sm mb-1 list-item-enter btn-hover font-medium flex items-center gap-2 border border-transparent ${isActive
                        ? 'bg-slate-800 text-emerald-400 border-slate-700/50 shadow-sm'
                        : 'text-slate-300 hover:bg-slate-800/50 hover:border-slate-700/30'
                        }`;
                    btn.innerHTML = `
                        <svg class="w-4 h-4 ${isActive ? 'text-emerald-500' : 'text-slate-500'}" fill="${isActive ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg> 
                        <span class="truncate">${escapeHTML(p.name)}</span>
                    `;
                    btn.onclick = () => selectProject(p.id, p.name);
                    elProjectsList.appendChild(btn);
                });
            } catch (e) {
                // handle silently or redirect
            }
        }

        document.getElementById('form-new-project').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputName = document.getElementById('input-project-name');
            const inputPasscode = document.getElementById('input-project-passcode');
            try {
                const newProject = await api('/projects', 'POST', {
                    name: inputName.value,
                    passcode: inputPasscode.value || null
                });
                inputName.value = '';
                inputPasscode.value = '';
                await loadProjects();
                selectProject(newProject.id, newProject.name);
                showToast("Project created");
            } catch (e) { }
        });

        async function selectProject(id, name) {
            currentProjectId = id;
            currentFileId = null;
            elCurrentProjectTitle.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg> ${escapeHTML(name)}`;
            elBtnToggleFiles.classList.remove('hidden');

            // Show files panel, hide projects if on mobile
            if (!isFilesVisible) toggleFiles();
            if (window.innerWidth < 768 && isProjectsVisible) toggleProjects();

            const btnDeleteProj = document.getElementById('btn-delete-project');
            if (isAdmin) btnDeleteProj.classList.remove('hidden');
            else btnDeleteProj.classList.add('hidden');

            await loadProjects();
            await loadFiles();
        }

        async function deleteCurrentProject() {
            if (!currentProjectId) return;
            if (!confirm("Are you sure you want to delete this project and ALL its files? This action cannot be undone.")) return;

            async function attemptDelete(passcode = null) {
                try {
                    const data = passcode ? { passcode } : {};
                    await api(`/projects/${currentProjectId}`, 'DELETE', data);
                    currentProjectId = null;
                    if (isFilesVisible) toggleFiles();
                    elBtnToggleFiles.classList.add('hidden');
                    elEditorArea.classList.add('hidden');
                    elEmptyState.classList.remove('hidden');
                    showToast("Project deleted");
                    await loadProjects();
                } catch (e) {
                    if (e.message && e.message.includes("Passcode required")) {
                        const enteredPasscode = prompt("Please enter the project passcode to delete it:");
                        if (enteredPasscode !== null) {
                            attemptDelete(enteredPasscode);
                        }
                    }
                }
            }

            attemptDelete();
        }

        // --- File Logic ---
        async function loadFiles() {
            if (!currentProjectId) return;
            const files = await api(`/projects/${currentProjectId}/files`);
            elFilesList.innerHTML = '';

            if (files.length === 0) {
                elFilesList.innerHTML = `
                <div class="text-[13px] text-slate-500 text-center mt-6 p-4 border border-slate-800/60 rounded-lg border-dashed">
                    No files yet.<br><span class="text-slate-600 mt-1 block">Create one to get started.</span>
                </div>`;
                return;
            }

            // Clean up missing folders from state
            const allPaths = new Set();
            files.forEach(f => {
                const parts = f.filename.split('/');
                let path = '';
                for (let i = 0; i < parts.length - 1; i++) {
                    path += (i === 0 ? '' : '/') + parts[i];
                    allPaths.add(path);
                }
            });
            Object.keys(folderState).forEach(k => { if (!allPaths.has(k)) delete folderState[k]; });

            // Group files by directory based on slashes in filename
            const tree = { name: 'root', path: '', files: [], dirs: {} };

            files.forEach(f => {
                const parts = f.filename.split('/');
                let currentLevel = tree;
                let currentPath = '';

                for (let i = 0; i < parts.length - 1; i++) {
                    const dirName = parts[i];
                    currentPath += (i === 0 ? '' : '/') + dirName;

                    if (!currentLevel.dirs[dirName]) {
                        currentLevel.dirs[dirName] = { name: dirName, path: currentPath, files: [], dirs: {} };
                        // Default folders to open if not tracked
                        if (folderState[currentPath] === undefined) folderState[currentPath] = true;
                    }
                    currentLevel = currentLevel.dirs[dirName];
                }
                currentLevel.files.push(f);
            });

            function renderTree(node, depth = 0, isParentOpen = true) {
                const paddingLeft = depth * 14;

                // Render directories
                Object.keys(node.dirs).sort().forEach(dirName => {
                    const childNode = node.dirs[dirName];
                    const isOpen = folderState[childNode.path];

                    const dirDiv = document.createElement('div');
                    // Hide if parent is closed
                    dirDiv.className = `w-full text-left px-3 py-1.5 rounded-lg text-[13px] font-semibold flex items-center justify-between group transition-colors ${!isParentOpen ? 'hidden' : 'text-slate-400 hover:bg-slate-800/40 cursor-pointer border border-transparent hover:border-slate-700/30'}`;
                    dirDiv.style.paddingLeft = `${paddingLeft + 12}px`;

                    // Folder Icon + Chevron
                    const chevron = isOpen
                        ? `<svg class="w-3.5 h-3.5 mr-1 text-slate-500 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`
                        : `<svg class="w-3.5 h-3.5 mr-1 text-slate-500 transition-transform -rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;

                    // Contextual New File button (admins only)
                    const actionBtn = isAdmin ? `
                        <button class="opacity-0 group-hover:opacity-100 hover:text-emerald-400 p-1 rounded-md transition-all z-10" onclick="event.stopPropagation(); promptNewFile('${childNode.path}')" title="New file here">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    ` : '';

                    dirDiv.innerHTML = `
                        <div class="flex items-center truncate">
                            ${chevron}
                            <svg class="w-4 h-4 text-emerald-500/70 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                            <span class="truncate transition-colors group-hover:text-slate-200">${escapeHTML(dirName)}</span>
                        </div>
                        ${actionBtn}
                    `;

                    dirDiv.onclick = () => {
                        folderState[childNode.path] = !folderState[childNode.path];
                        loadFiles(); // Re-render tree
                    };

                    elFilesList.appendChild(dirDiv);

                    // Recursively render children, passing down visibility state
                    renderTree(childNode, depth + 1, isParentOpen && isOpen);
                });

                // Render files
                node.files.sort((a, b) => a.filename.localeCompare(b.filename)).forEach(f => {
                    const btn = document.createElement('button');
                    const isActive = currentFileId === f.id;
                    const fileNameOnly = f.filename.split('/').pop();

                    btn.className = `w-full text-left px-3 py-2 rounded-lg text-[13px] mb-[1px] font-mono transition-all flex items-center gap-2.5 border border-transparent ${!isParentOpen ? 'hidden' : isActive
                        ? 'bg-slate-800/80 text-emerald-300 border-slate-700/50 shadow-sm'
                        : 'text-slate-300 hover:bg-slate-800/40 hover:text-slate-200'
                        }`;
                    btn.style.paddingLeft = `${paddingLeft + 24}px`;

                    btn.innerHTML = `${getFileIcon(fileNameOnly)} <span class="truncate">${escapeHTML(fileNameOnly)}</span>`;
                    btn.onclick = () => selectFile(f.id, f.filename);
                    elFilesList.appendChild(btn);
                });
            }

            renderTree(tree);
        }

        document.getElementById('form-new-file').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentProjectId) return;
            const input = document.getElementById('input-file-name');
            try {
                const newFile = await api(`/projects/${currentProjectId}/files`, 'POST', {
                    filename: input.value,
                    content: '// Write your code here...'
                });
                input.value = '';
                await loadFiles();
                selectFile(newFile.id, newFile.filename);
                showToast("File created");
            } catch (e) { }
        });

        async function selectFile(id, filename) {
            currentFileId = id;
            elEmptyState.classList.add('hidden');
            elEditorArea.classList.remove('hidden');
            elCurrentFileName.innerText = filename;

            // On mobile, hide the sidebars when a file is selected
            if (window.innerWidth < 768) {
                if (isFilesVisible) toggleFiles();
                if (isProjectsVisible) toggleProjects();
            }

            const btnDeleteFile = document.getElementById('btn-delete-file');
            if (isAdmin) {
                btnDeleteFile.classList.remove('hidden');
                elBtnEditToggle.classList.remove('hidden');
            } else {
                btnDeleteFile.classList.add('hidden');
                elBtnEditToggle.classList.add('hidden');
            }

            await loadFiles();

            try {
                const fileData = await api(`/files/${id}`);

                elCodeEditor.value = fileData.content || '';

                // Set language class correctly for Highlight.js refresh
                const ext = filename.split('.').pop();
                elCodeViewer.className = `h-full block p-6 text-[13px] leading-relaxed font-mono selection:bg-emerald-500/30 language-${ext}`;
                elCodeViewer.textContent = fileData.content || '';
                hljs.highlightElement(elCodeViewer);

                // Default to view mode
                if (isEditing) toggleEditMode();
            } catch (e) { }
        }

        async function saveFile() {
            if (!currentFileId) return;
            const newContent = elCodeEditor.value;

            const originalText = elBtnSave.innerHTML;
            elBtnSave.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving`;

            try {
                await api(`/files/${currentFileId}`, 'PUT', { content: newContent });

                elCodeViewer.textContent = newContent;
                hljs.highlightElement(elCodeViewer);

                showToast("File saved successfully!");
                toggleEditMode();
            } catch (e) { } finally {
                elBtnSave.innerHTML = originalText;
            }
        }

        async function deleteCurrentFile() {
            if (!currentFileId) return;
            if (!confirm(`Are you sure you want to delete "${elCurrentFileName.innerText}"?`)) return;
            try {
                await api(`/files/${currentFileId}`, 'DELETE');
                currentFileId = null;
                elEditorArea.classList.add('hidden');
                elEmptyState.classList.remove('hidden');
                showToast("File deleted");
                await loadFiles();
            } catch (e) { }
        }

        // --- Contextual File Creation ---
        function promptNewFile(dirPath) {
            const input = document.getElementById('input-file-name');
            input.value = dirPath + '/';
            input.focus();

            // Highlight the text cursor at the end
            setTimeout(() => {
                input.selectionStart = input.selectionEnd = input.value.length;
            }, 50);
        }

        // --- UI Interactions ---
        function toggleEditMode() {
            isEditing = !isEditing;
            if (isEditing) {
                elViewMode.classList.add('hidden');
                elEditMode.classList.remove('hidden');
                elBtnEditToggle.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Cancel`;
                elBtnEditToggle.classList.replace('bg-indigo-500/10', 'bg-slate-700');
                elBtnEditToggle.classList.replace('text-indigo-400', 'text-slate-300');
                elBtnSave.classList.remove('hidden');
                elCodeEditor.focus();
            } else {
                elEditMode.classList.add('hidden');
                elViewMode.classList.remove('hidden');
                elBtnEditToggle.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> Edit`;
                elBtnEditToggle.classList.replace('bg-slate-700', 'bg-indigo-500/10');
                elBtnEditToggle.classList.replace('text-slate-300', 'text-indigo-400');
                elBtnSave.classList.add('hidden');

                // Revert to viewer content if cancelled
                elCodeEditor.value = elCodeViewer.textContent;
            }
        }

        // Utils
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Start App
        init();
    </script>
</body>
