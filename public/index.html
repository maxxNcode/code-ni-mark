<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE ni MARK</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Editor base styles */
        #code-editor {
            font-family: 'Courier New', Courier, monospace;
            tab-size: 4;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-950 border-b border-slate-800 p-4 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-500 text-slate-950 font-black px-3 py-1 rounded text-xl">CM</div>
            <h1 class="text-2xl font-bold tracking-tight text-white">CODE ni <span class="text-emerald-400">MARK</span></h1>
        </div>
        <div class="flex items-center gap-4 text-sm text-slate-400">
            <span>Mark's Personal Code Repository</span>
            <button id="btn-show-login" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded transition-colors border border-slate-700">Admin Login</button>
            <button id="btn-logout" class="px-3 py-1 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded transition-colors border border-red-500/20 hidden">Logout</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Projects Column -->
        <div class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-4 border-b border-slate-800">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Projects</h2>
                <form id="form-new-project" class="flex gap-2 hidden admin-only">
                    <input type="text" id="input-project-name" placeholder="New Project..." class="w-full bg-slate-800 text-sm px-3 py-1.5 rounded border border-slate-700 focus:outline-none focus:border-emerald-500 text-slate-200" required>
                    <button type="submit" class="bg-slate-700 hover:bg-emerald-600 px-3 py-1.5 rounded text-sm transition-colors">+</button>
                </form>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="projects-list">
                <!-- Projects injected here via JS -->
            </div>
        </div>

        <!-- Files Column -->
        <div class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col hidden" id="files-column">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider truncate" id="current-project-title">Files</h2>
                <button onclick="deleteCurrentProject()" class="text-red-400 hover:text-red-300 text-xs hidden admin-only" id="btn-delete-project" title="Delete Project">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            <div class="p-3 border-b border-slate-700 hidden admin-only" id="container-new-file">
                <form id="form-new-file" class="flex gap-2">
                    <input type="text" id="input-file-name" placeholder="filename.js" class="w-full bg-slate-900 text-sm px-3 py-1.5 rounded border border-slate-600 focus:outline-none focus:border-emerald-500 text-slate-200" required>
                    <button type="submit" class="bg-slate-600 hover:bg-emerald-600 px-3 py-1.5 rounded text-sm transition-colors">+</button>
                </form>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="files-list">
                <!-- Files injected here via JS -->
            </div>
        </div>

        <!-- Editor/Viewer Area -->
        <div class="flex-1 bg-[#282c34] flex flex-col hidden relative" id="editor-area">
            
            <!-- Editor Toolbar -->
            <div class="h-12 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4">
                <div class="flex items-center gap-3">
                    <span id="current-file-name" class="font-mono text-sm text-emerald-400 font-bold"></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyCode()" class="px-3 py-1 text-sm bg-slate-700 hover:bg-slate-600 text-white rounded transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy
                    </button>
                    <button onclick="deleteCurrentFile()" class="px-3 py-1 text-sm bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded border border-red-500/20 transition-colors hidden admin-only" id="btn-delete-file">Delete File</button>
                    <button id="btn-edit-toggle" onclick="toggleEditMode()" class="px-4 py-1 text-sm bg-slate-700 hover:bg-slate-600 text-white rounded transition-colors hidden admin-only">Edit Code</button>
                    <button id="btn-save" onclick="saveFile()" class="px-4 py-1 text-sm bg-emerald-600 hover:bg-emerald-500 text-white rounded transition-colors hidden shadow-lg shadow-emerald-500/20 admin-only">Save Changes</button>
                </div>
            </div>

            <!-- Viewing Area (Syntax Highlighted) -->
            <div id="view-mode" class="flex-1 overflow-auto relative">
                <pre class="m-0 h-full"><code id="code-viewer" class="h-full block p-6 text-sm"></code></pre>
            </div>

            <!-- Editing Area (Textarea) -->
            <div id="edit-mode" class="flex-1 relative hidden">
                <textarea id="code-editor" class="w-full h-full bg-[#282c34] text-[#abb2bf] p-6 text-sm focus:outline-none resize-none" spellcheck="false"></textarea>
            </div>
            
            <!-- Toast Notification -->
            <div id="toast" class="absolute bottom-4 right-4 bg-emerald-500 text-white px-4 py-2 rounded shadow-lg transform transition-transform translate-y-20 opacity-0 z-50">
                Saved successfully!
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex-1 flex items-center justify-center bg-slate-950 flex-col text-slate-500">
            <svg class="w-20 h-20 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
            <h2 class="text-xl font-bold mb-2">Welcome to CODE ni MARK</h2>
            <p>Select a project to browse the code.</p>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-lg shadow-xl w-96">
            <h2 class="text-xl font-bold text-white mb-4">Admin Login</h2>
            <form id="form-login">
                <input type="password" id="input-password" placeholder="Enter admin password" class="w-full bg-slate-800 text-slate-200 px-4 py-2 rounded border border-slate-700 focus:outline-none focus:border-emerald-500 mb-4" required>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="document.getElementById('login-modal').classList.add('hidden')" class="px-4 py-2 rounded text-sm text-slate-400 hover:text-slate-200">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-sm transition-colors">Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // State
        let currentProjectId = null;
        let currentFileId = null;
        let isEditing = false;
        let isAdmin = localStorage.getItem('adminToken') !== null;

        // Elements
        const elProjectsList = document.getElementById('projects-list');
        const elFilesList = document.getElementById('files-list');
        const elFilesColumn = document.getElementById('files-column');
        const elEditorArea = document.getElementById('editor-area');
        const elEmptyState = document.getElementById('empty-state');
        const elCurrentProjectTitle = document.getElementById('current-project-title');
        const elCurrentFileName = document.getElementById('current-file-name');
        const elCodeViewer = document.getElementById('code-viewer');
        const elCodeEditor = document.getElementById('code-editor');
        const elViewMode = document.getElementById('view-mode');
        const elEditMode = document.getElementById('edit-mode');
        const elBtnEditToggle = document.getElementById('btn-edit-toggle');
        const elBtnSave = document.getElementById('btn-save');
        const elToast = document.getElementById('toast');
        const elLoginModal = document.getElementById('login-modal');
        const elBtnShowLogin = document.getElementById('btn-show-login');
        const elBtnLogout = document.getElementById('btn-logout');

        // Initialize
        async function init() {
            updateAuthUI();
            await loadProjects();
            // Handle Tabs in textarea
            elCodeEditor.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });
        }

        // --- Auth Logic ---
        function updateAuthUI() {
            const adminElements = document.querySelectorAll('.admin-only');
            if (isAdmin) {
                adminElements.forEach(el => el.classList.remove('hidden'));
                elBtnShowLogin.classList.add('hidden');
                elBtnLogout.classList.remove('hidden');
            } else {
                adminElements.forEach(el => el.classList.add('hidden'));
                
                // Ensure specific forms/containers hide properly
                document.getElementById('form-new-project').classList.add('hidden');
                document.getElementById('container-new-file').classList.add('hidden');
                
                elBtnShowLogin.classList.remove('hidden');
                elBtnLogout.classList.add('hidden');
                if(isEditing) toggleEditMode(); // exit edit mode if logged out
            }
        }

        elBtnShowLogin.addEventListener('click', () => elLoginModal.classList.remove('hidden'));
        
        elBtnLogout.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            isAdmin = false;
            updateAuthUI();
            showToast("Logged out successfully");
            
            // Re-select to hide buttons properly if a file is open
            if(currentProjectId) selectProject(currentProjectId, elCurrentProjectTitle.innerText);
        });

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('input-password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (!res.ok) throw new Error("Invalid password");
                const data = await res.json();
                localStorage.setItem('adminToken', data.token);
                isAdmin = true;
                elLoginModal.classList.add('hidden');
                document.getElementById('input-password').value = '';
                updateAuthUI();
                showToast("Logged in as Admin");
                
                // Refresh UI for active files/projects
                if(currentProjectId) selectProject(currentProjectId, elCurrentProjectTitle.innerText);
                if(currentFileId) selectFile(currentFileId, elCurrentFileName.innerText);
                
            } catch(e) {
                alert(e.message);
            }
        });

        function showToast(message) {
            elToast.innerText = message;
            elToast.style.transform = "translateY(0)";
            elToast.style.opacity = "1";
            setTimeout(() => {
                elToast.style.transform = "translateY(20px)";
                elToast.style.opacity = "0";
            }, 2500);
        }

        async function copyCode() {
            const textToCopy = elCodeViewer.textContent;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                } else {
                    // Fallback for non-HTTPS or iframes
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                showToast("Code copied to clipboard!");
            } catch (err) {
                alert('Failed to copy code.');
            }
        }

        // --- API Helpers ---
        async function api(endpoint, method = 'GET', data = null) {
            const options = { method, headers: {} };
            const token = localStorage.getItem('adminToken');
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            if (data) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
            const response = await fetch('/api' + endpoint, options);
            if (!response.ok) {
                const err = await response.json();
                if(response.status === 401 && isAdmin) {
                    localStorage.removeItem('adminToken');
                    isAdmin = false;
                    updateAuthUI();
                    alert("Session expired. Please log in again.");
                } else if(response.status !== 401) {
                    alert('Error: ' + err.error);
                }
                throw new Error(err.error);
            }
            return response.json();
        }

        // --- Project Logic ---
        async function loadProjects() {
            const projects = await api('/projects');
            elProjectsList.innerHTML = '';
            projects.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded text-sm mb-1 transition-colors ${currentProjectId === p.id ? 'bg-slate-700 text-emerald-400 font-bold' : 'text-slate-300 hover:bg-slate-800'}`;
                btn.innerHTML = `<span class="mr-2 opacity-50">📁</span> ${escapeHTML(p.name)}`;
                btn.onclick = () => selectProject(p.id, p.name);
                elProjectsList.appendChild(btn);
            });
        }

        document.getElementById('form-new-project').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('input-project-name');
            try {
                const newProject = await api('/projects', 'POST', { name: input.value });
                input.value = '';
                await loadProjects();
                selectProject(newProject.id, newProject.name);
            } catch(e) { }
        });

        async function selectProject(id, name) {
            currentProjectId = id;
            currentFileId = null;
            elCurrentProjectTitle.innerText = name;
            elFilesColumn.classList.remove('hidden');
            elEditorArea.classList.add('hidden');
            elEmptyState.classList.remove('hidden');
            
            const btnDeleteProj = document.getElementById('btn-delete-project');
            if(isAdmin) btnDeleteProj.classList.remove('hidden');
            else btnDeleteProj.classList.add('hidden');

            await loadProjects(); // refresh active state
            await loadFiles();
        }

        async function deleteCurrentProject() {
            if(!currentProjectId) return;
            if(!confirm("Are you sure you want to delete this project and ALL its files?")) return;
            await api(`/projects/${currentProjectId}`, 'DELETE');
            currentProjectId = null;
            elFilesColumn.classList.add('hidden');
            elEditorArea.classList.add('hidden');
            elEmptyState.classList.remove('hidden');
            await loadProjects();
        }

        // --- File Logic ---
        async function loadFiles() {
            if (!currentProjectId) return;
            const files = await api(`/projects/${currentProjectId}/files`);
            elFilesList.innerHTML = '';
            
            if (files.length === 0) {
                elFilesList.innerHTML = '<div class="text-xs text-slate-500 text-center mt-4 italic">No files yet. Add one!</div>';
            }

            files.forEach(f => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded text-sm mb-1 font-mono transition-colors ${currentFileId === f.id ? 'bg-slate-700 text-emerald-400' : 'text-slate-300 hover:bg-slate-700'}`;
                
                // Determine icon based on extension roughly
                let icon = '📄';
                if(f.filename.endsWith('.js')) icon = '🟨';
                if(f.filename.endsWith('.html')) icon = '🟧';
                if(f.filename.endsWith('.css')) icon = '🟦';
                if(f.filename.endsWith('.json')) icon = '{}';

                btn.innerHTML = `<span class="mr-2 opacity-70">${icon}</span> ${escapeHTML(f.filename)}`;
                btn.onclick = () => selectFile(f.id, f.filename);
                elFilesList.appendChild(btn);
            });
        }

        document.getElementById('form-new-file').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentProjectId) return;
            const input = document.getElementById('input-file-name');
            try {
                const newFile = await api(`/projects/${currentProjectId}/files`, 'POST', { 
                    filename: input.value, 
                    content: '// Write your code here...' 
                });
                input.value = '';
                await loadFiles();
                selectFile(newFile.id, newFile.filename);
            } catch(e) { }
        });

        async function selectFile(id, filename) {
            currentFileId = id;
            elEmptyState.classList.add('hidden');
            elEditorArea.classList.remove('hidden');
            elCurrentFileName.innerText = filename;
            
            const btnDeleteFile = document.getElementById('btn-delete-file');
            if(isAdmin) {
                btnDeleteFile.classList.remove('hidden');
                elBtnEditToggle.classList.remove('hidden');
            } else {
                btnDeleteFile.classList.add('hidden');
                elBtnEditToggle.classList.add('hidden');
            }

            await loadFiles(); // update active state in list
            
            const fileData = await api(`/files/${id}`);
            
            // Setup viewer and editor
            elCodeEditor.value = fileData.content || '';
            
            // Set language class for Highlight.js
            const ext = filename.split('.').pop();
            elCodeViewer.className = `h-full block p-6 text-sm language-${ext}`;
            elCodeViewer.textContent = fileData.content || '';
            hljs.highlightElement(elCodeViewer);

            // Default to view mode when selecting a file
            if(isEditing) toggleEditMode(); 
        }

        async function saveFile() {
            if (!currentFileId) return;
            const newContent = elCodeEditor.value;
            
            elBtnSave.innerText = "Saving...";
            await api(`/files/${currentFileId}`, 'PUT', { content: newContent });
            
            // Update viewer
            elCodeViewer.textContent = newContent;
            hljs.highlightElement(elCodeViewer);
            
            elBtnSave.innerText = "Save Changes";
            
            showToast("Saved successfully!");

            // Switch back to view mode after saving
            toggleEditMode();
        }

        async function deleteCurrentFile() {
            if(!currentFileId) return;
            if(!confirm("Are you sure you want to delete this file?")) return;
            await api(`/files/${currentFileId}`, 'DELETE');
            currentFileId = null;
            elEditorArea.classList.add('hidden');
            elEmptyState.classList.remove('hidden');
            await loadFiles();
        }

        // --- UI Interactions ---
        function toggleEditMode() {
            isEditing = !isEditing;
            if (isEditing) {
                elViewMode.classList.add('hidden');
                elEditMode.classList.remove('hidden');
                elBtnEditToggle.innerText = "Cancel Edit";
                elBtnEditToggle.classList.replace('bg-slate-700', 'bg-slate-600');
                elBtnSave.classList.remove('hidden');
                elCodeEditor.focus();
            } else {
                elEditMode.classList.add('hidden');
                elViewMode.classList.remove('hidden');
                elBtnEditToggle.innerText = "Edit Code";
                elBtnEditToggle.classList.replace('bg-slate-600', 'bg-slate-700');
                elBtnSave.classList.add('hidden');
                
                // Reset textarea to viewer content in case they cancelled
                elCodeEditor.value = elCodeViewer.textContent;
            }
        }

        // Utils
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Start App
        init();
    </script>
</body>
</html>
